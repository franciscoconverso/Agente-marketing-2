<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente — Paid Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #e8ff47;
    --accent2: #c8df30;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #login-screen::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, rgba(232,255,71,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 20%, rgba(232,255,71,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-box {
    width: 360px;
    padding: 48px 40px;
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .login-title {
    font-size: 24px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .login-sub {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 36px;
    font-family: var(--mono);
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 24px;
    letter-spacing: 0.1em;
  }

  .login-input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s, transform 0.1s;
  }

  .login-btn:hover { background: var(--accent2); }
  .login-btn:active { transform: scale(0.99); }

  .login-error {
    font-family: var(--mono);
    font-size: 11px;
    color: #ff6b6b;
    margin-top: 12px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .login-error.show { opacity: 1; }

  /* ── APP ── */
  #app-screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }

  /* Header */
  .header {
    height: 52px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .header-logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .header-divider { width: 0.5px; height: 20px; background: var(--border); }

  .client-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .client-tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 0.5px solid transparent;
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    position: relative;
  }

  .client-tab:hover { color: var(--text2); border-color: var(--border); }

  .client-tab.active {
    color: var(--accent);
    border-color: var(--border2);
    background: rgba(232,255,71,0.04);
  }

  .client-tab .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .client-tab.active .dot { opacity: 1; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }

  .new-client-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .new-client-btn:hover { border-color: var(--border2); color: var(--text2); }

  .logout-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: var(--text2); }

  /* Layout */
  .app-body {
    display: flex;
    flex: 1;
    height: calc(100vh - 52px);
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    border-right: 0.5px solid var(--border);
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .shortcut-item {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text2);
    padding: 8px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    line-height: 1.4;
  }

  .shortcut-item:hover {
    color: var(--text);
    border-left-color: var(--border2);
    background: rgba(255,255,255,0.02);
  }

  .sidebar-divider {
    height: 0.5px;
    background: var(--border);
    margin: 12px 16px;
  }

  .clear-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    padding: 8px 16px;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s;
    margin-top: auto;
  }
  .clear-btn:hover { color: var(--text2); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .client-header {
    padding: 16px 28px 12px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .client-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .client-desc {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); }

  .message { display: flex; flex-direction: column; gap: 6px; max-width: 80%; }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.agent { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .msg-bubble {
    padding: 12px 16px;
    font-size: 13.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .msg-bubble {
    background: rgba(232,255,71,0.06);
    border: 0.5px solid rgba(232,255,71,0.2);
    color: var(--text);
  }

  .message.agent .msg-bubble {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text);
    position: relative;
  }

  .message.agent .msg-bubble::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0.5px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.3;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    width: fit-content;
  }

  .typing-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.2; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.3); }
  }

  /* Input */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap { flex: 1; position: relative; }

  #chat-input {
    width: 100%;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 12px 16px;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #chat-input:focus { border-color: var(--border2); }
  #chat-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; }

  /* Modal nuevo cliente */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    width: 480px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    padding: 36px 32px;
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .modal-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .modal-input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .modal-input:focus { border-color: var(--border2); }
  .modal-textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.5;
    font-family: var(--sans);
  }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .modal-cancel {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-cancel:hover { border-color: var(--border2); color: var(--text2); }

  .modal-save {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    color: #0a0a0a;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s;
  }
  .modal-save:hover { background: var(--accent2); }

  /* Responsive */
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .client-tab { padding: 6px 10px; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .client-header { padding: 12px 16px; }
  }

  /* Fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message { animation: fadeUp 0.2s ease-out; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Paid Media Agent</div>
    <div class="login-title">Acceso al<br>sistema</div>
    <div class="login-sub">// v1.0 — uso interno</div>
    <div class="field-label">Contraseña</div>
    <input type="password" class="login-input" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Ingresar</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="header">
    <div class="header-logo">PMA//</div>
    <div class="header-divider"></div>
    <div class="client-tabs" id="client-tabs"></div>
    <div class="header-right">
      <button class="new-client-btn" onclick="openModal()">+ Cliente</button>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-label">Accesos rápidos</div>
      <div id="shortcuts-list"></div>
      <div class="sidebar-divider"></div>
      <button class="clear-btn" onclick="clearChat()">↺ Limpiar chat</button>
    </div>

    <div class="chat-area">
      <div class="client-header">
        <div class="client-name" id="client-name-display"></div>
        <div class="client-desc" id="client-desc-display"></div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea id="chat-input" placeholder="Escribí tu consulta..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NUEVO CLIENTE -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">// Nuevo cliente</div>
    <input type="text" class="modal-input" id="modal-name" placeholder="Nombre del cliente (ej: Mi Empresa)">
    <input type="text" class="modal-input" id="modal-desc" placeholder="Descripción corta (ej: E-commerce de ropa)">
    <textarea class="modal-input modal-textarea" id="modal-context" placeholder="Pegá acá el contexto completo del negocio: qué vende, público, canales, tono, objetivos..."></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveClient()">Guardar cliente</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const PASSWORD = 'pma2025';
const API_KEY_PLACEHOLDER = 'TU_API_KEY_AQUI';

const BASE_SYSTEM = `Sos un especialista senior en performance marketing y estrategia comercial. Combinás experiencia en Meta Ads, Google Ads, copywriting y estrategia de negocio.

Trabajás exclusivamente en resultados: conversiones, ROI, ventas. No das teoría sin aplicación práctica.

Cuando te mandan contexto de un cliente, lo analizás y operás como su estratega de paid media. Cuando no hay cliente activo, respondés como consultor senior general.

Reglas fijas:
- Directo, sin relleno
- Bajás todo a acciones concretas
- Si algo está mal, lo decís
- Pensás como si fuera tu plata
- Sin copies genéricos ni frases vacías
- Sin emojis innecesarios

El usuario es Francisco, 20 años, argentino, conoce Meta Ads y Google Ads — tratalo como colega.`;

const DEFAULT_CLIENTS = [
  {
    id: 'rondo',
    name: 'Rondó',
    desc: 'Burger boxes premium — lanzamiento 14 mayo',
    shortcuts: [
      ['Campaña de lanzamiento 14 de mayo — pedidos por WhatsApp desde Instagram', 'Campaña lanzamiento'],
      ['Copies para Instagram Reels. Público: pibes 18-30 zona norte Buenos Aires', 'Copies Reels'],
      ['Segmentación Meta Ads: intereses, lookalikes y remarketing para Rondó', 'Segmentación'],
      ['¿Google Ads en el lanzamiento o solo Meta? Dame tu criterio.', 'Meta vs Google'],
      ['Estrategia B2B para clubes y terceros tiempos de rugby en zona norte', 'Canal B2B']
    ],
    context: `Cliente: Rondó
Producto: boxes de hamburguesas premium para hacer en casa. Medallones Blend N°2 (Roast Beef 45% + Tapa Asado 40% + Grasa Peya 15%), pan brioche, cheddar Milkaut, panceta ahumada. Todo envasado al vacío.
Concepto: experiencia para juntadas. La hamburguesería premium en tu casa, sin complicarte.
Competencia real: delivery, cocinar en casa, pedir pizza — no solo hamburgueserías.
Público: jóvenes 18-30, grupos de amigos, organizadores de juntadas. San Isidro y zona norte, Buenos Aires.
Combos: Box x6 / Box x12 hamburguesas dobles.
Canal principal: Instagram → WhatsApp.
Tono: simple, directo, natural, argentino. NUNCA "experiencia premium", "calidad superior" ni frases genéricas.
Modelo: B2C venta directa + B2B con clubes/eventos (negociaciones con Club Atlético San Isidro).
Lanzamiento: 14 de mayo. Stock: ~300 hamburguesas/mes.`
  },
  {
    id: 'vlan',
    name: 'Vlan',
    desc: 'Ray-Ban originales — foco B2B',
    shortcuts: [
      ['Estrategia Meta Ads para escalar B2B de Vlan. Target: concesionarias e inmobiliarias.', 'Campaña B2B'],
      ['Copies para Instagram que posicionen Vlan como herramienta de cierre, no tienda de anteojos.', 'Copies B2B'],
      ['¿Cómo genero leads B2B calificados (gerentes, dueños) desde Meta Ads?', 'Leads B2B'],
      ['Estrategia para reactivar ventas B2C. ¿Meta Ads o contenido orgánico?', 'Reactivar B2C'],
      ['Armá el pitch de Vlan para una concesionaria de autos.', 'Pitch concesionaria']
    ],
    context: `Cliente: Vlan
Negocio: e-commerce de anteojos Ray-Ban originales en Argentina. Importación paralela — productos originales, precios muy competitivos.
Precios de compra: modelos base USD 41, nuevos USD 46, línea Ferrari USD 52.
Estado: +150 anteojos vendidos, 0 quejas relevantes, operaciones B2B realizadas (ej: Pharmex).
Canal B2C: Instagram → WhatsApp. Consumo minorista cayendo.
Foco estratégico: escalar B2B — regalos corporativos, incentivos, activaciones, herramientas de cierre de ventas.
Targets B2B: concesionarias, inmobiliarias, empresas de consumo masivo, marcas lifestyle.
Posicionamiento correcto: NO es una tienda de anteojos. ES una herramienta de diferenciación comercial para empresas.
Propuesta B2B clave: "Regalo premium de cierre" — concesionaria regala Ray-Ban al vender un auto, inmobiliaria al cerrar operación.
Estrategia comercial: contactar decisores, vender impacto no producto, pruebas piloto, casos reales como argumento.`
  },
  {
    id: 'general',
    name: 'General',
    desc: 'Consultas técnicas sin cliente específico',
    shortcuts: [
      ['¿Cuál es la mejor estructura de campaña Meta Ads para un negocio nuevo sin datos de píxel?', 'Meta Ads desde cero'],
      ['Diferencia entre CBO y ABO y cuándo usar cada uno', 'CBO vs ABO'],
      ['¿Cómo armo una campaña Performance Max en Google Ads?', 'Performance Max'],
      ['¿Qué métricas miro primero en una campaña nueva de Meta Ads?', 'Métricas clave']
    ],
    context: `Modo consultor general. No hay cliente activo. Respondé como especialista senior en Meta Ads y Google Ads.`
  }
];

// ── STATE ──
let clients = JSON.parse(localStorage.getItem('pma_clients') || 'null') || DEFAULT_CLIENTS;
let histories = {};
let currentClientId = clients[0].id;

// ── LOGIN ──
function tryLogin() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    initApp();
  } else {
    const err = document.getElementById('login-error');
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 2000);
  }
}

function logout() {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// ── INIT ──
function initApp() {
  renderTabs();
  switchClient(currentClientId);
}

function renderTabs() {
  const container = document.getElementById('client-tabs');
  container.innerHTML = '';
  clients.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'client-tab' + (c.id === currentClientId ? ' active' : '');
    btn.innerHTML = `<span class="dot"></span>${c.name}`;
    btn.onclick = () => switchClient(c.id);
    container.appendChild(btn);
  });
}

function switchClient(id) {
  currentClientId = id;
  if (!histories[id]) histories[id] = [];
  renderTabs();
  const client = clients.find(c => c.id === id);
  document.getElementById('client-name-display').textContent = client.name;
  document.getElementById('client-desc-display').textContent = '// ' + client.desc;
  renderShortcuts(client);
  renderMessages(id);
  if (histories[id].length === 0) showWelcome(client);
}

function renderShortcuts(client) {
  const list = document.getElementById('shortcuts-list');
  list.innerHTML = '';
  client.shortcuts.forEach(([prompt, label]) => {
    const el = document.createElement('div');
    el.className = 'shortcut-item';
    el.textContent = label;
    el.onclick = () => { document.getElementById('chat-input').value = prompt; sendMessage(); };
    list.appendChild(el);
  });
}

function showWelcome(client) {
  const greetings = {
    rondo: 'Contexto Rondó cargado. Lanzamiento 14 de mayo, B2C por Instagram/WhatsApp y B2B con clubes.\n\n¿Arrancamos con la campaña de lanzamiento o necesitás algo específico?',
    vlan: 'Contexto Vlan cargado. Foco en B2B: concesionarias, inmobiliarias, empresas. +150 unidades vendidas, modelo validado.\n\n¿Campaña B2B, copies o estrategia de leads?',
    general: 'Modo general activo. Meta Ads, Google Ads, estrategia, copies — sin contexto de cliente específico.\n\n¿Qué necesitás?'
  };
  const text = greetings[client.id] || `Contexto de ${client.name} cargado. ¿Por dónde arrancamos?`;
  appendMessage('agent', text);
  histories[currentClientId].push({ role: 'assistant', content: text });
}

// ── CHAT ──
function renderMessages(clientId) {
  const container = document.getElementById('messages');
  container.innerHTML = '';
}

function appendMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  const client = clients.find(c => c.id === currentClientId);
  label.textContent = role === 'user' ? 'Francisco' : 'Agente — ' + client.name;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(label);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'message agent';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Agente';
  const bubble = document.createElement('div');
  bubble.className = 'typing-indicator';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  div.appendChild(label);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  appendMessage('user', text);
  histories[currentClientId].push({ role: 'user', content: text });
  showTyping();

  const client = clients.find(c => c.id === currentClientId);
  const systemPrompt = BASE_SYSTEM + '\n\n--- CONTEXTO DEL CLIENTE ACTIVO ---\n' + client.context;

  // Filtrar el primer mensaje del agente (welcome) del historial enviado a la API
  const apiHistory = histories[currentClientId].filter((m, i) => !(i === 0 && m.role === 'assistant'));

  try {
    const apiKey = localStorage.getItem('pma_apikey') || API_KEY_PLACEHOLDER;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: apiHistory
      })
    });

    const data = await res.json();
    const reply = data.content?.[0]?.text || (data.error ? 'Error: ' + data.error.message : 'Sin respuesta.');
    removeTyping();
    appendMessage('agent', reply);
    histories[currentClientId].push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    appendMessage('agent', 'Error de conexión. Verificá tu API key o la conexión a internet.');
  }

  btn.disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function clearChat() {
  histories[currentClientId] = [];
  document.getElementById('messages').innerHTML = '';
  const client = clients.find(c => c.id === currentClientId);
  showWelcome(client);
}

// ── NUEVO CLIENTE ──
function openModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-desc').value = '';
  document.getElementById('modal-context').value = '';
}

function saveClient() {
  const name = document.getElementById('modal-name').value.trim();
  const desc = document.getElementById('modal-desc').value.trim();
  const context = document.getElementById('modal-context').value.trim();
  if (!name || !context) return;

  const id = 'client_' + Date.now();
  const newClient = {
    id,
    name,
    desc: desc || 'Cliente personalizado',
    shortcuts: [
      ['Analizá el negocio y decime qué campaña haría primero', 'Primera campaña'],
      ['Armá la segmentación ideal para este negocio en Meta Ads', 'Segmentación'],
      ['Necesito copies para Instagram que conviertan', 'Copies Instagram'],
      ['¿Meta Ads, Google Ads o ambos? Dame tu criterio.', 'Plataforma']
    ],
    context
  };

  clients.push(newClient);
  localStorage.setItem('pma_clients', JSON.stringify(clients));
  closeModal();
  renderTabs();
  switchClient(id);
}

// ── API KEY CONFIG ──
const savedKey = localStorage.getItem('pma_apikey');
if (!savedKey || savedKey === API_KEY_PLACEHOLDER) {
  const key = prompt('Ingresá tu API key de Anthropic para activar el agente:\n(La podés encontrar en console.anthropic.com)');
  if (key && key.startsWith('sk-')) {
    localStorage.setItem('pma_apikey', key);
  }
}
